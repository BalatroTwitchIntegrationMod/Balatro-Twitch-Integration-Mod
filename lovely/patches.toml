[manifest]
version = "1.0.0"
dump_lua = true
priority = 9999999

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''G.SPLASH_BACK:define_draw_steps({{
    shader = 'splash',
    send = {
        {name = 'time', ref_table = G.TIMERS, ref_value = 'REAL_SHADER'},
        {name = 'vort_speed', val = 0.4},
        {name = 'colour_1', ref_table = G.C, ref_value = 'RED'},
        {name = 'colour_2', ref_table = G.C, ref_value = 'BLUE'},
        {name = 'mid_flash', ref_table = splash_args, ref_value = 'mid_flash'},
        {name = 'vort_offset', val = 0},
    }}})'''
position = "at"
payload = '''
    G.SPLASH_BACK:define_draw_steps({{
    shader = 'splash',
    send = {
        {name = 'time', ref_table = G.TIMERS, ref_value = 'REAL_SHADER'},
        {name = 'vort_speed', val = 0.4},
        {name = 'colour_1', ref_table = G.ARGS.LOC_COLOURS, ref_value = 'ttv_purple'},
        {name = 'colour_2', ref_table = G.ARGS.LOC_COLOURS, ref_value = 'ttv_purple2'},
        {name = 'mid_flash', ref_table = splash_args, ref_value = 'mid_flash'},
        {name = 'vort_offset', val = 0},
    }}})
'''
match_indent = true
