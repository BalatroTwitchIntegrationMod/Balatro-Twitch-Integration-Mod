<html>

<head>
    <title>Balatro Twitch Integration</title>

    <script>
        const hash = location.hash

        location.hash = ""

        const sendToken = () => {
            fetch("/token?" + hash.substr(1)).finally(() => {
                document.getElementById("message").style.display = null
            })
        }
    </script>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            font-size: 32px;
            color: #D0D0D0;
            background-color: #0A0A0A;
        }
    </style>
</head>

<body>
    <span id="message" style="display: none;">
        You can close this window
    </span>
</body>

<script>sendToken()</script>

</html>
